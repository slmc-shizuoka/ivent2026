<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スマートライフAO富士校 — 年間イベント</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Zen+Maru+Gothic:wght@700;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════
   SCREEN STYLES
═══════════════════════════════════════ */
:root {
  --blue:   #1a6ef5;
  --blue2:  #3b8cff;
  --blue3:  #d0e6ff;
  --blue4:  #e8f2ff;
  --white:  #ffffff;
  --ink:    #0a1f5c;
  --ink2:   #2a3f8a;
  --pop1:   #ffe066;
  --pop2:   #ff6b9d;
  --pop3:   #00d4b4;
  --radius-pill: 999px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --shadow-pop: 4px 4px 0 var(--ink);
  --shadow-pop-sm: 2px 2px 0 var(--ink);
  --shadow-pop-lg: 6px 6px 0 var(--ink);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--white);color:var(--ink);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,var(--blue3) 2px,transparent 2px),radial-gradient(circle,#ffe06644 2px,transparent 2px);background-size:48px 48px,72px 72px;background-position:0 0,24px 24px;opacity:.55;}

/* HEADER */
.site-header{position:relative;z-index:10;background:var(--blue);border-bottom:3px solid var(--ink);overflow:hidden;}
.header-stripes{position:absolute;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(-45deg,transparent,transparent 12px,rgba(255,255,255,.07) 12px,rgba(255,255,255,.07) 24px);}
.header-inner{position:relative;max-width:1100px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;gap:16px;}
.header-logo{background:var(--pop1);border:2.5px solid var(--ink);border-radius:var(--radius-md);width:56px;height:56px;display:flex;align-items:center;justify-content:center;font-size:28px;box-shadow:var(--shadow-pop);flex-shrink:0;transform:rotate(-3deg);}
.header-text{flex:1;}
.header-text h1{font-family:'Zen Maru Gothic',sans-serif;font-size:22px;font-weight:900;color:#fff;text-shadow:2px 2px 0 var(--ink);letter-spacing:.05em;}
.header-text p{font-size:12px;color:rgba(255,255,255,.85);margin-top:3px;font-weight:700;letter-spacing:.08em;}
.header-tags{display:flex;gap:8px;flex-wrap:wrap;}
.h-tag{background:var(--white);border:2px solid var(--ink);border-radius:var(--radius-pill);padding:4px 14px;font-size:12px;font-weight:900;color:var(--ink);box-shadow:var(--shadow-pop-sm);white-space:nowrap;}
.h-tag.yellow{background:var(--pop1);}
.h-tag.pink{background:var(--pop2);color:#fff;}

/* MAIN */
.main{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:28px 24px 60px;}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px;}
.stat-card{background:var(--white);border:2.5px solid var(--ink);border-radius:var(--radius-lg);padding:18px 16px 14px;box-shadow:var(--shadow-pop);text-align:center;position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s;}
.stat-card:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-pop-lg);}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;}
.stat-card:nth-child(1)::before{background:var(--blue);}
.stat-card:nth-child(2)::before{background:var(--pop1);}
.stat-card:nth-child(3)::before{background:var(--pop2);}
.stat-card:nth-child(4)::before{background:var(--pop3);}
.stat-label{font-size:10px;font-weight:900;color:var(--ink2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px;}
.stat-value{font-family:'Zen Maru Gothic',sans-serif;font-size:40px;font-weight:900;color:var(--blue);line-height:1;}
.stat-card:nth-child(2) .stat-value{color:#a07800;}
.stat-card:nth-child(3) .stat-value{color:var(--pop2);}
.stat-card:nth-child(4) .stat-value{font-size:16px;padding-top:10px;color:var(--ink);}
.stat-sub{font-size:11px;color:var(--ink2);margin-top:4px;font-weight:700;}

/* CONTROL BAR */
.control-bar{background:var(--blue4);border:2.5px solid var(--ink);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:20px;box-shadow:var(--shadow-pop);display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.view-tabs{display:flex;gap:6px;}
.view-tab{padding:8px 18px;font-size:13px;font-weight:900;font-family:'Noto Sans JP',sans-serif;border:2px solid var(--ink);border-radius:var(--radius-pill);background:var(--white);color:var(--ink);cursor:pointer;transition:all .15s;box-shadow:var(--shadow-pop-sm);letter-spacing:.03em;}
.view-tab:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink);}
.view-tab.active{background:var(--blue);color:#fff;transform:translate(-2px,-2px);box-shadow:4px 4px 0 var(--ink);}
.ctrl-sep{width:2px;height:30px;background:var(--ink);border-radius:2px;opacity:.15;}
.ctrl-label{font-size:12px;font-weight:900;color:var(--ink2);white-space:nowrap;}
select,input[type="text"]{border:2px solid var(--ink);border-radius:var(--radius-pill);padding:7px 14px;font-size:13px;font-family:'Noto Sans JP',sans-serif;font-weight:700;color:var(--ink);background:var(--white);outline:none;box-shadow:var(--shadow-pop-sm);transition:box-shadow .15s,transform .15s;min-width:130px;cursor:pointer;}
select:focus,input[type="text"]:focus{box-shadow:3px 3px 0 var(--blue);border-color:var(--blue);transform:translate(-1px,-1px);}
.search-wrap{position:relative;flex:1;min-width:160px;}
.search-wrap input{width:100%;padding-left:34px;cursor:text;}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}

/* PRINT BUTTONS */
.print-bar{background:var(--white);border:2.5px solid var(--ink);border-radius:var(--radius-lg);padding:14px 20px;margin-bottom:20px;box-shadow:var(--shadow-pop);display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.print-bar-label{font-size:12px;font-weight:900;color:var(--ink2);white-space:nowrap;margin-right:4px;}
.print-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;font-size:13px;font-weight:900;font-family:'Noto Sans JP',sans-serif;border:2px solid var(--ink);border-radius:var(--radius-pill);background:var(--white);color:var(--ink);cursor:pointer;transition:all .15s;box-shadow:var(--shadow-pop-sm);}
.print-btn:hover{transform:translate(-1px,-1px);box-shadow:3px 3px 0 var(--ink);}
.print-btn.blue{background:var(--blue);color:#fff;}
.print-btn.yellow{background:var(--pop1);}
.print-btn.pink{background:var(--pop2);color:#fff;}

/* LEGEND */
.legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:12px;font-weight:900;color:var(--ink);background:var(--white);border:2px solid var(--ink);border-radius:var(--radius-pill);padding:4px 12px;box-shadow:var(--shadow-pop-sm);transition:transform .12s;cursor:default;}
.legend-item:hover{transform:translate(-1px,-1px);}
.legend-dot{width:10px;height:10px;border-radius:50%;border:1.5px solid rgba(0,0,0,.2);flex-shrink:0;}

/* MONTH GROUP */
.month-group{margin-bottom:26px;}
.month-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.month-stamp{background:var(--blue);color:#fff;font-family:'Zen Maru Gothic',sans-serif;font-size:18px;font-weight:900;padding:4px 18px;border-radius:var(--radius-pill);border:2px solid var(--ink);box-shadow:var(--shadow-pop-sm);letter-spacing:.05em;}
.month-count-badge{background:var(--pop1);color:var(--ink);font-size:12px;font-weight:900;padding:3px 10px;border-radius:var(--radius-pill);border:2px solid var(--ink);box-shadow:2px 2px 0 var(--ink);}
.month-line{flex:1;height:2px;background:repeating-linear-gradient(90deg,var(--ink) 0,var(--ink) 6px,transparent 6px,transparent 12px);opacity:.12;}

/* EVENT CARDS */
.event-list{display:flex;flex-direction:column;gap:8px;}
.event-card{background:var(--white);border:2.5px solid var(--ink);border-radius:var(--radius-lg);padding:12px 16px 12px 22px;display:flex;align-items:center;gap:14px;box-shadow:var(--shadow-pop);transition:transform .12s,box-shadow .12s;position:relative;overflow:hidden;}
.event-card:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-pop-lg);}
.event-card.special{background:var(--blue4);}
.event-card.special::after{content:'★ SPECIAL';position:absolute;top:8px;right:12px;font-size:10px;font-weight:900;background:var(--pop1);border:1.5px solid var(--ink);border-radius:var(--radius-pill);padding:1px 8px;color:var(--ink);box-shadow:1px 1px 0 var(--ink);}
.lbar{position:absolute;left:0;top:0;bottom:0;width:7px;border-radius:14px 0 0 14px;}
.date-block{min-width:52px;text-align:center;flex-shrink:0;}
.date-day{font-family:'Zen Maru Gothic',sans-serif;font-size:30px;font-weight:900;color:var(--blue);line-height:1;}
.date-weekday{display:inline-block;font-size:11px;font-weight:900;margin-top:3px;background:var(--blue3);border:1.5px solid var(--ink);border-radius:var(--radius-pill);padding:1px 7px;color:var(--ink);}
.date-weekday.sun{background:#ffd6d6;}
.sep-dots{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.sep-dot{width:5px;height:5px;border-radius:50%;background:var(--ink);opacity:.15;}
.event-body{flex:1;min-width:0;}
.cat-badge{display:inline-block;font-size:11px;font-weight:900;padding:2px 10px;border-radius:var(--radius-pill);border:1.5px solid var(--ink);margin-bottom:4px;box-shadow:1px 1px 0 var(--ink);}
.event-name{font-size:14px;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.event-time-chip{background:var(--blue4);border:1.5px solid var(--ink);border-radius:var(--radius-pill);padding:4px 12px;font-size:12px;font-weight:900;color:var(--ink);white-space:nowrap;flex-shrink:0;}
.bc-comp{background:#d0e6ff;color:#0a3a8f;}
.bc-esports{background:#d4f8e8;color:#065f30;}
.bc-digital{background:#fff4c2;color:#7a4f00;}
.bc-activity{background:#ede0ff;color:#5a1a9a;}
.bc-school{background:#ffdde8;color:#9b1a40;}
.bc-shotensha{background:#d0fff5;color:#065048;}
.bc-ao{background:#dde8ff;color:#0a2a7a;}

/* CALENDAR */
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.cal-nav h3{font-family:'Zen Maru Gothic',sans-serif;font-size:20px;font-weight:900;flex:1;text-align:center;background:var(--blue);color:#fff;padding:8px 0;border:2.5px solid var(--ink);border-radius:var(--radius-pill);box-shadow:var(--shadow-pop);text-shadow:1px 1px 0 var(--ink);}
.nav-btn{background:var(--white);border:2px solid var(--ink);border-radius:var(--radius-pill);padding:8px 18px;cursor:pointer;font-size:16px;font-weight:900;font-family:'Noto Sans JP',sans-serif;color:var(--blue);box-shadow:var(--shadow-pop-sm);transition:transform .12s,box-shadow .12s;}
.nav-btn:hover{transform:translate(-2px,-2px);box-shadow:var(--shadow-pop);}
.cal-wrapper{background:var(--white);border:2.5px solid var(--ink);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-pop-lg);}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);background:var(--blue);border-bottom:2.5px solid var(--ink);}
.cal-wday{text-align:center;padding:10px 4px;font-size:13px;font-weight:900;color:rgba(255,255,255,.9);letter-spacing:.06em;}
.cal-wday.sun{color:#ffb3b3;}
.cal-wday.sat{color:#b3d4ff;}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);}
.cal-cell{min-height:88px;border-right:1.5px solid var(--blue3);border-bottom:1.5px solid var(--blue3);padding:5px;background:var(--white);}
.cal-cell:nth-child(7n){border-right:none;}
.cal-cell.other-month{background:#f7f9ff;}
.cal-cell.today{background:var(--blue4);}
.cal-date-num{font-family:'Zen Maru Gothic',sans-serif;font-size:13px;font-weight:900;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;color:var(--ink);margin-bottom:2px;}
.cal-date-num.sun{color:#c0392b;}
.cal-date-num.sat{color:var(--blue);}
.other-month .cal-date-num{color:#bbb;}
.cal-cell.today .cal-date-num{background:var(--blue);color:#fff;border:2px solid var(--ink);}
.cal-ev{font-size:9.5px;padding:2px 5px;border-radius:6px;margin-bottom:2px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:700;line-height:1.4;border:1px solid rgba(0,0,0,.18);}
.more-tag{font-size:10px;color:var(--ink2);font-weight:900;padding-left:2px;}
.empty-state{text-align:center;padding:48px;font-size:14px;font-weight:700;color:var(--ink2);}
.empty-state .icon{font-size:48px;margin-bottom:12px;}

/* FOOTER */
.site-footer{position:relative;z-index:1;background:var(--blue);border-top:3px solid var(--ink);text-align:center;padding:22px;font-size:13px;font-weight:900;color:rgba(255,255,255,.85);letter-spacing:.06em;}
.footer-stars{color:var(--pop1);letter-spacing:6px;display:block;margin-bottom:6px;font-size:16px;}

@keyframes pop-in{from{opacity:0;transform:translateY(10px) scale(.97);}to{opacity:1;transform:none;}}
.event-card{animation:pop-in .2s ease both;}

@media(max-width:640px){
  .stats-row{grid-template-columns:repeat(2,1fr);}
  .header-tags{display:none;}
  .cal-cell{min-height:60px;}
  .header-text h1{font-size:17px;}
  .ctrl-sep{display:none;}
}

/* ═══════════════════════════════════════
   PRINT MODAL OVERLAY
═══════════════════════════════════════ */
.print-modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,31,92,.55);z-index:9000;align-items:center;justify-content:center;}
.print-modal-overlay.open{display:flex;}
.print-modal{background:var(--white);border:3px solid var(--ink);border-radius:var(--radius-lg);box-shadow:8px 8px 0 var(--ink);padding:28px 32px;max-width:420px;width:90%;position:relative;}
.print-modal h2{font-family:'Zen Maru Gothic',sans-serif;font-size:20px;font-weight:900;color:var(--ink);margin-bottom:6px;}
.print-modal p{font-size:13px;color:var(--ink2);font-weight:700;margin-bottom:20px;}
.print-modal-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:22px;}
.print-opt{display:flex;align-items:center;gap:10px;padding:12px 16px;border:2px solid var(--ink);border-radius:var(--radius-md);cursor:pointer;font-weight:900;font-size:14px;background:var(--white);transition:all .12s;box-shadow:var(--shadow-pop-sm);font-family:'Noto Sans JP',sans-serif;}
.print-opt:hover{transform:translate(-1px,-1px);box-shadow:var(--shadow-pop);}
.print-opt.sel-all{background:var(--blue);color:#fff;}
.print-opt.sel-cat{background:var(--pop1);color:var(--ink);}
.print-opt.sel-cal{background:var(--blue3);color:var(--ink);}
.print-modal-close{position:absolute;top:14px;right:16px;background:none;border:none;font-size:20px;cursor:pointer;font-weight:900;color:var(--ink);}
.print-modal-btns{display:flex;gap:10px;justify-content:flex-end;}
.pm-btn{padding:9px 22px;font-size:13px;font-weight:900;font-family:'Noto Sans JP',sans-serif;border:2px solid var(--ink);border-radius:var(--radius-pill);cursor:pointer;box-shadow:var(--shadow-pop-sm);transition:all .12s;}
.pm-btn:hover{transform:translate(-1px,-1px);box-shadow:var(--shadow-pop);}
.pm-btn.go{background:var(--blue);color:#fff;}
.pm-btn.cancel{background:var(--white);color:var(--ink);}

/* ═══════════════════════════════════════
   PRINT STYLES  (@media print)
═══════════════════════════════════════ */
@media print {
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  body { background: #fff !important; }
  body::before { display: none; }
  .site-header, .main, .site-footer, .print-modal-overlay { display: none !important; }

  /* Print container shows */
  #print-root { display: block !important; }

  /* ── Page setup ── */
  @page { size: A4; margin: 15mm 12mm; }

  /* ── Print Header ── */
  .pr-header {
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 3px solid #0a1f5c;
    padding-bottom: 10px;
    margin-bottom: 14px;
  }
  .pr-logo {
    width: 46px; height: 46px;
    background: #1a6ef5;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    color: #fff;
    flex-shrink: 0;
  }
  .pr-title { font-size: 18px; font-weight: 900; color: #0a1f5c; }
  .pr-subtitle { font-size: 11px; color: #2a3f8a; margin-top: 2px; font-weight: 700; }
  .pr-meta { margin-left: auto; text-align: right; font-size: 10px; color: #2a3f8a; font-weight: 700; }

  /* ── Print Legend ── */
  .pr-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 14px;
  }
  .pr-legend-item {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 8.5px;
    font-weight: 700;
    border: 1px solid rgba(10,31,92,0.3);
    border-radius: 20px;
    padding: 2px 8px;
  }
  .pr-legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  /* ── ALL list ── */
  .pr-month-section { margin-bottom: 16px; page-break-inside: avoid; }
  .pr-month-title {
    background: #1a6ef5;
    color: #fff;
    font-size: 12px;
    font-weight: 900;
    padding: 4px 14px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 6px;
  }
  .pr-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 10.5px;
  }
  .pr-table th {
    background: #1a6ef5;
    color: #fff;
    font-weight: 900;
    padding: 6px 10px;
    border: 1px solid #0a1f5c;
    text-align: left;
    font-size: 10px;
    letter-spacing: 0.03em;
  }
  .pr-table td {
    padding: 7px 10px;
    border: 1px solid #d0e6ff;
    font-size: 10.5px;
    vertical-align: middle;
    line-height: 1.4;
  }
  .pr-table tr:nth-child(even) td { background: #f4f8ff; }
  .pr-table tr.special-row td { background: #fffbe6; }
  .pr-cat-pill {
    display: inline-block;
    font-size: 9px;
    font-weight: 900;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }
  .pr-date-cell { white-space: nowrap; font-weight: 900; font-size: 11px; }
  .pr-wd-cell { text-align: center; font-weight: 900; font-size: 11px; }
  .pr-time-cell { white-space: nowrap; color: #2a3f8a; font-weight: 700; }
  .pr-name-cell { font-weight: 700; }

  /* ── Category print ── */
  .pr-cat-page { page-break-before: always; }
  .pr-cat-page:first-child { page-break-before: avoid; }
  .pr-cat-cover {
    padding: 14px 18px 12px;
    border-radius: 8px;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .pr-cat-cover-icon { font-size: 34px; line-height: 1; }
  .pr-cat-cover-name { font-size: 20px; font-weight: 900; line-height: 1.1; }
  .pr-cat-cover-meta { font-size: 11px; font-weight: 700; margin-top: 4px; opacity: 0.75; }
  .pr-cat-month-block { margin-bottom: 16px; page-break-inside: avoid; }
  .pr-cat-month-label {
    font-size: 11px;
    font-weight: 900;
    padding: 3px 14px;
    border-radius: 20px;
    display: inline-block;
    margin-bottom: 5px;
    color: #fff;
    background: #1a6ef5;
  }
  .pr-cat-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 11.5px;
  }
  .pr-cat-table th {
    padding: 7px 14px;
    font-weight: 900;
    font-size: 10px;
    text-align: left;
    border-bottom: 2.5px solid;
    letter-spacing: 0.04em;
  }
  .pr-cat-table td {
    padding: 9px 14px;
    border-bottom: 1px solid #e0ecff;
    vertical-align: middle;
    font-size: 11.5px;
    line-height: 1.5;
  }
  .pr-cat-table tr:last-child td { border-bottom: 2px solid; }
  .pr-cat-table tr.special-row td { background: #fffbe6; }
  .pr-cat-date { font-weight: 900; white-space: nowrap; font-size: 13px; }
  .pr-cat-wd { font-weight: 900; text-align: center; width: 24px; font-size: 12px; }
  .pr-cat-time { color: #2a3f8a; font-weight: 700; white-space: nowrap; font-size: 11px; }
  .pr-cat-name { font-weight: 700; }
  .pr-cat-summary {
    margin-top: 14px;
    padding: 8px 16px;
    border-radius: 6px;
    background: #e8f2ff;
    font-size: 10.5px;
    font-weight: 700;
    color: #0a1f5c;
    text-align: right;
  }

  /* ── Calendar print ── */

  });

  calPrintMonths=[...new Set(EVENTS.map(e=>e.date.slice(0,7)))].sort();
}
function renderList(){
  const filtered=getFiltered();
  if(!filtered.length){
    document.getElementById("list-view").innerHTML='<div class="empty-state"><div class="icon">🔍</div><p>該当するイベントがありません</p></div>';return;
  }
  const byMonth={};
  filtered.forEach(e=>{const m=e.date.slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(e);});
  let html='<div class="event-list">';
  Object.keys(byMonth).sort().forEach(m=>{
    const [y,mo]=m.split("-");
    html+=`<div class="month-group"><div class="month-header"><span class="month-stamp">${y}年 ${parseInt(mo)}月</span><span class="month-count-badge">${byMonth[m].length}件</span><div class="month-line"></div></div>`;
    byMonth[m].forEach((e,i)=>{
      const d=e.date.split("-");
      const wd=wkd(e.date);
      const meta=CAT_META[e.cat]||{cls:"bc-ao",icon:""};
      const lcolor=(CAT_META[e.cat]||{cal:"#1a6ef5"}).cal;
      const isSpecial=e.cat==="AO校"||e.name.includes("オープンキャンパス")||e.name.includes("周年");
      html+=`<div class="event-card${isSpecial?" special":""}" style="animation-delay:${i*0.025}s">
        <div class="lbar" style="background:${lcolor}"></div>
        <div class="date-block"><div class="date-day">${parseInt(d[2])}</div><div class="date-weekday ${wkdCls(wd)}">${WDLABEL[wd]}</div></div>
        <div class="sep-dots"><div class="sep-dot"></div><div class="sep-dot"></div><div class="sep-dot"></div></div>
        <div class="event-body"><span class="cat-badge ${meta.cls}">${meta.icon} ${e.cat}</span><div class="event-name">${e.name}</div></div>
        <div class="event-time-chip">🕐 ${e.t}</div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  document.getElementById("list-view").innerHTML=html;
}
function renderCalendar(){
  const filtered=getFiltered();
  const evMap={};
  filtered.forEach(e=>{if(!evMap[e.date])evMap[e.date]=[];evMap[e.date].push(e);});
  const firstDay=new Date(calYear,calMonth-1,1).getDay();
  const daysInMonth=new Date(calYear,calMonth,0).getDate();
  const prevDays=new Date(calYear,calMonth-1,0).getDate();
  let html=`<div class="cal-nav"><button class="nav-btn" onclick="calPrev()">◀</button><h3>${calYear}年 ${calMonth}月</h3><button class="nav-btn" onclick="calNext()">▶</button></div>
  <div class="cal-wrapper"><div class="cal-weekdays">${WDLABEL.map((w,i)=>`<div class="cal-wday${i===0?" sun":i===6?" sat":""}">${w}</div>`).join("")}</div><div class="cal-cells">`;
  for(let i=0;i<firstDay;i++)html+=`<div class="cal-cell other-month"><div class="cal-date-num">${prevDays-firstDay+1+i}</div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${calYear}-${String(calMonth).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
    const evts=evMap[ds]||[];
    const wd=new Date(calYear,calMonth-1,d).getDay();
    html+=`<div class="cal-cell${evts.length>0?" has-events":""}"><div class="cal-date-num ${wkdCls(wd)}">${d}</div>${evts.slice(0,3).map(e=>{const c=(CAT_META[e.cat]||{cal:"#888"}).cal;return`<div class="cal-ev" style="background:${c}" title="${e.cat}：${e.name}">${e.name}</div>`;}).join("")}${evts.length>3?`<div class="more-tag">+${evts.length-3}</div>`:""}</div>`;
  }
  const trailing=42-firstDay-daysInMonth;
  for(let d=1;d<=trailing;d++)html+=`<div class="cal-cell other-month"><div class="cal-date-num">${d}</div></div>`;
  html+='</div></div>';
  document.getElementById("cal-view").innerHTML=html;
}
function calPrev(){calMonth--;if(calMonth<1){calMonth=12;calYear--;}renderCalendar();}
function calNext(){calMonth++;if(calMonth>12){calMonth=1;calYear++;}renderCalendar();}
function render(){if(view==="list")renderList();else renderCalendar();}

/* ══════════════════════════════════════
   PRINT MODAL
══════════════════════════════════════ */
function openPrintModal(mode){
  currentPrintMode=mode;
  const overlay=document.getElementById("print-modal-overlay");
  const title=document.getElementById("pm-title");
  const desc=document.getElementById("pm-desc");
  const opts=document.getElementById("pm-opts");
  if(mode==="all"){
    title.textContent="全カテゴリー年間一覧";
    desc.textContent="全 "+EVENTS.length+" 件のイベントを月別の表形式で印刷します。";
    opts.innerHTML=`<div class="print-opt sel-all">📄 全カテゴリー・全月の一覧表（A4縦）</div>`;
  } else if(mode==="cat"){
    title.textContent="カテゴリー別年間一覧";
    desc.textContent="印刷するカテゴリーを選択してください（複数可）。";
    opts.innerHTML=`<div style="display:flex;flex-direction:column;gap:8px;">
      ${Object.entries(CAT_META).map(([k,v])=>`
        <label style="display:flex;align-items:center;gap:10px;padding:10px 14px;border:2px solid #0a1f5c;border-left:5px solid ${v.cal};border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;background:${v.bg};color:${v.tx};">
          <input type="checkbox" name="print-cat" value="${k}" checked style="width:16px;height:16px;cursor:pointer;flex-shrink:0;">
          ${v.icon} ${k}<span style="margin-left:auto;font-size:11px;opacity:.7;">${EVENTS.filter(e=>e.cat===k).length}件</span>
        </label>`).join("")}
    </div>`;
  } else {
    title.textContent="月間カレンダー";
    desc.textContent="印刷する月を選択してください（複数可）。";
    opts.innerHTML=`<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
      ${calPrintMonths.map(m=>{
        const [y,mo]=m.split("-");
        return`<label style="display:flex;align-items:center;gap:6px;padding:8px 12px;border:2px solid #0a1f5c;border-radius:10px;cursor:pointer;font-weight:700;font-size:13px;background:#e8f2ff;">
          <input type="checkbox" name="cal-month" value="${m}" checked style="width:16px;height:16px;cursor:pointer;">
          ${y}年${parseInt(mo)}月
        </label>`;
      }).join("")}
    </div>`;
  }
  overlay.classList.add("open");
}
function closePrintModal(){
  document.getElementById("print-modal-overlay").classList.remove("open");
}

/* ══════════════════════════════════════
   PRINT HTML BUILDERS
══════════════════════════════════════ */
function buildPrHeader(subtitle){
  const now=new Date();
  const dateStr=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 印刷`;
  return`<div class="pr-header">
    <div class="pr-logo">🏫</div>
    <div>
      <div class="pr-title">スマートライフAO富士校</div>
      <div class="pr-subtitle">${subtitle}</div>
    </div>
    <div class="pr-meta">WEST / 1130 富士BASE<br>${dateStr}</div>
  </div>`;
}
function buildPrLegend(){
  return`<div class="pr-legend">${Object.entries(CAT_META).map(([k,v])=>`
    <div class="pr-legend-item" style="background:${v.bg};color:${v.tx};border-color:${v.tx}40;">
      <div class="pr-legend-dot" style="background:${v.cal}"></div>${k}
    </div>`).join("")}</div>`;
}
function buildPrTable(events){
  if(!events.length) return '<p style="font-size:11px;color:#999;padding:8px;">イベントなし</p>';
  return`<table class="pr-table">
    <thead><tr><th style="width:70px;">日付</th><th style="width:22px;">曜</th><th style="width:80px;">時間</th><th style="width:110px;">カテゴリー</th><th>内容</th></tr></thead>
    <tbody>${events.map(e=>{
      const d=e.date.split("-");
      const wd=wkd(e.date);
      const wdcol=wd===0?"color:#c0392b":wd===6?"color:#1a6ef5":"";
      const m=CAT_META[e.cat]||{bg:"#eee",tx:"#333"};
      const isSpecial=e.cat==="AO校"||e.name.includes("オープンキャンパス")||e.name.includes("周年");
      return`<tr${isSpecial?' class="special-row"':''}>
        <td class="pr-date-cell">${parseInt(d[1])}/${parseInt(d[2])}</td>
        <td style="${wdcol};font-weight:900;text-align:center;">${WDLABEL[wd]}</td>
        <td class="pr-time-cell">${e.t}</td>
        <td><span class="pr-cat-pill" style="background:${m.bg};color:${m.tx};border-color:${m.tx};">${e.cat}</span></td>
        <td style="font-weight:700;">${e.name}${isSpecial?' ⭐':''}</td>
      </tr>`;
    }).join("")}</tbody>
  </table>`;
}
function buildAllList(){
  const byMonth={};
  EVENTS.forEach(e=>{const m=e.date.slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(e);});
  let html=buildPrHeader("年間イベント一覧 2026–2027")+buildPrLegend();
  html+=`<div class="pr-page-title">📄 全カテゴリー 年間イベント一覧（${EVENTS.length}件）</div>`;
  Object.keys(byMonth).sort().forEach(m=>{
    const [y,mo]=m.split("-");
    html+=`<div class="pr-month-section">
      <div class="pr-month-title">${y}年 ${parseInt(mo)}月（${byMonth[m].length}件）</div>
      ${buildPrTable(byMonth[m])}
    </div>`;
  });
  html+=`<div class="pr-footer-line">スマートライフ富士BASE ｜ スマートライフAO富士校 ｜ 年間イベント一覧 2026–2027</div>`;
  return html;
}
function buildCatList(selectedCats){
  const now=new Date();
  const dateStr=`${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日 印刷`;
  let html='';
  let isFirst=true;

  Object.entries(CAT_META).forEach(([cat,meta])=>{
    if(!selectedCats.includes(cat)) return;
    const evts=EVENTS.filter(e=>e.cat===cat);
    if(!evts.length) return;

    const byMonth={};
    evts.forEach(e=>{const m=e.date.slice(0,7);if(!byMonth[m])byMonth[m]=[];byMonth[m].push(e);});

    // ページ（カテゴリーごと）
    html+=`<div class="pr-cat-page${isFirst?' style="page-break-before:avoid"':''}">`;

    // ページヘッダー
    html+=`<div style="display:flex;align-items:center;gap:14px;border-bottom:3px solid ${meta.cal};padding-bottom:10px;margin-bottom:16px;">
      <div style="width:44px;height:44px;background:${meta.cal};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;">${meta.icon}</div>
      <div style="flex:1;">
        <div style="font-size:17px;font-weight:900;color:#0a1f5c;">${cat}</div>
        <div style="font-size:10px;color:#2a3f8a;font-weight:700;margin-top:2px;">スマートライフAO富士校 ｜ 年間イベントスケジュール 2026–2027 ｜ 計 ${evts.length}件</div>
      </div>
      <div style="font-size:9px;color:#2a3f8a;font-weight:700;text-align:right;">WEST / 1130 富士BASE<br>${dateStr}</div>
    </div>`;

    // 月ごとのテーブル
    Object.keys(byMonth).sort().forEach(m=>{
      const [y,mo]=m.split("-");
      const monthEvts=byMonth[m];
      html+=`<div class="pr-cat-month-block">
        <div class="pr-cat-month-label" style="background:${meta.cal};">${y}年 ${parseInt(mo)}月　${monthEvts.length}件</div>
        <table class="pr-cat-table">
          <thead>
            <tr style="background:${meta.bg};color:${meta.tx};border-bottom:2.5px solid ${meta.cal};">
              <th style="width:60px;border-bottom:2.5px solid ${meta.cal};color:${meta.tx};">日付</th>
              <th style="width:22px;text-align:center;border-bottom:2.5px solid ${meta.cal};color:${meta.tx};">曜</th>
              <th style="width:90px;border-bottom:2.5px solid ${meta.cal};color:${meta.tx};">時間</th>
              <th style="border-bottom:2.5px solid ${meta.cal};color:${meta.tx};">イベント内容</th>
            </tr>
          </thead>
          <tbody>
            ${monthEvts.map(e=>{
              const d=e.date.split("-");
              const wd=wkd(e.date);
              const wdcol=wd===0?'color:#c0392b;':wd===6?'color:#1a6ef5;':'';
              const isSpecial=e.cat==="AO校"||e.name.includes("オープンキャンパス")||e.name.includes("周年");
              return`<tr${isSpecial?' class="special-row"':''}>
                <td class="pr-cat-date" style="border-bottom:1px solid ${meta.cal}40;">${parseInt(d[1])}月${parseInt(d[2])}日</td>
                <td class="pr-cat-wd" style="${wdcol}border-bottom:1px solid ${meta.cal}40;">${WDLABEL[wd]}</td>
                <td class="pr-cat-time" style="border-bottom:1px solid ${meta.cal}40;">${e.t}</td>
                <td class="pr-cat-name" style="border-bottom:1px solid ${meta.cal}40;">${e.name}${isSpecial?' ⭐':''}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>`;
    });

    // ページフッター
    html+=`<div style="margin-top:auto;padding-top:10px;border-top:1.5px solid ${meta.cal};font-size:9px;color:#2a3f8a;font-weight:700;display:flex;justify-content:space-between;">
      <span>スマートライフ富士BASE ｜ スマートライフAO富士校</span>
      <span>${cat} 年間スケジュール ｜ 全${evts.length}件</span>
    </div>`;

    html+=`</div>`;
    isFirst=false;
  });
  return html;
}
function buildCalPages(selectedMonths){
  const evMap={};
  EVENTS.forEach(e=>{if(!evMap[e.date])evMap[e.date]=[];evMap[e.date].push(e);});
  let html=buildPrHeader("月間カレンダー 2026–2027")+buildPrLegend();
  selectedMonths.forEach((m,idx)=>{
    const [y,mo]=m.split("-");
    const year=parseInt(y), month=parseInt(mo);
    const firstDay=new Date(year,month-1,1).getDay();
    const daysInMonth=new Date(year,month,0).getDate();
    const prevDays=new Date(year,month-1,0).getDate();
    if(idx>0) html+=`<div style="page-break-before:always;"></div>`;
    html+=`<div class="pr-cal-month-title">${y}年 ${parseInt(mo)}月</div>`;
    html+=`<table class="pr-cal-grid"><thead><tr>`;
    WDLABEL.forEach((w,i)=>{html+=`<th class="${i===0?'sun':i===6?'sat':''}">${w}</th>`;});
    html+=`</tr></thead><tbody>`;
    let cellCount=0;
    let row=`<tr>`;
    for(let i=0;i<firstDay;i++){
      row+=`<td class="other"><span class="pr-d-num" style="color:#ccc;">${prevDays-firstDay+1+i}</span></td>`;
      cellCount++;
    }
    for(let d=1;d<=daysInMonth;d++){
      const ds=`${y}-${String(month).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
      const evts=evMap[ds]||[];
      const wd=new Date(year,month-1,d).getDay();
      row+=`<td class="${evts.length>0?'has-event':''}">
        <span class="pr-d-num${wd===0?' sun':wd===6?' sat':''}">${d}</span>
        ${evts.slice(0,4).map(e=>{const c=(CAT_META[e.cat]||{cal:"#888"}).cal;return`<span class="pr-cal-ev" style="background:${c};">${e.name}</span>`;}).join("")}
        ${evts.length>4?`<span class="pr-cal-more">+${evts.length-4}件</span>`:""}
      </td>`;
      cellCount++;
      if(cellCount%7===0&&d<daysInMonth){row+=`</tr><tr>`;}
    }
    const trailing=7-(cellCount%7===0?7:cellCount%7);
    if(trailing<7){for(let d=1;d<=trailing;d++){row+=`<td class="other"><span class="pr-d-num" style="color:#ccc;">${d}</span></td>`;}}
    row+=`</tr>`;
    html+=row+`</tbody></table>`;
    html+=`<div class="pr-footer-line">スマートライフAO富士校 ｜ ${y}年${parseInt(mo)}月 イベントカレンダー</div>`;
  });
  return html;
}

/* ══════════════════════════════════════
   EXECUTE PRINT
══════════════════════════════════════ */
function executePrint(){
  let html="";
  if(currentPrintMode==="all"){
    html=buildAllList();
  } else if(currentPrintMode==="cat"){
    const checked=[...document.querySelectorAll('input[name="print-cat"]:checked')].map(c=>c.value);
    if(!checked.length){alert("カテゴリーを1つ以上選択してください。");return;}
    html=buildCatList(checked);
  } else {
    const checked=[...document.querySelectorAll('input[name="cal-month"]:checked')].map(c=>c.value);
    if(!checked.length){alert("月を1つ以上選択してください。");return;}
    html=buildCalPages(checked);
  }
  document.getElementById("print-root").innerHTML=html;
  closePrintModal();
  setTimeout(()=>{ window.print(); },100);
}
